name: Build & Release from Zip

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '发布名称'
        required: true
        default: 'Auto Build'
      zip_filename:
        description: '压缩包文件名'
        required: true
        default: 'AudioCaptureApp_Final_For_Friend.tar.gz' 

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Unpack Source Code
        run: |
          echo "📦 正在解压 ${{ github.event.inputs.zip_filename }} ..."
          tar -xzf "${{ github.event.inputs.zip_filename }}"
          rm "${{ github.event.inputs.zip_filename }}"
          echo "✅ 解压完成，当前目录结构："
          ls -R

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 调试和修复 gradlew 行尾与权限
      - name: Prepare gradlew (debug & fix)
        run: |
          echo "=== 修复前检查 ==="
          file gradlew
          echo "--- 前两行原始内容（含不可见字符）---"
          head -n 2 gradlew | cat -A
          echo "--- 文件权限 ---"
          ls -l gradlew

          echo "=== 开始修复 ==="
          # 方法1: 使用 sed 转换 CRLF -> LF
          sed -i 's/\r$//' gradlew
          # 方法2: 如果 sed 无效，可以尝试 dos2unix（需安装）
          # sudo apt-get update && sudo apt-get install -y dos2unix && dos2unix gradlew

          echo "=== 修复后检查 ==="
          file gradlew
          echo "--- 前两行修复后内容 ---"
          head -n 2 gradlew | cat -A
          echo "--- 文件权限 ---"
          ls -l gradlew

          # 确保可执行
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            📦 **自动构建版本**
            - 源文件: ${{ github.event.inputs.zip_filename }}
            - 时间: ${{ github.event.head_commit.timestamp }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

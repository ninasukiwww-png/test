name: Build Debug APK

# 触发条件：当向main分支推送代码时自动运行 [citation:1]
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你的代码到虚拟机 [citation:1][citation:4][citation:7]
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置Java开发环境 (Android构建必需) [citation:1][citation:4][citation:7]
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # 可根据项目需要选择11或17 [citation:4][citation:8]
          distribution: 'temurin'

      # 3. 赋予gradlew执行权限并构建Debug APK [citation:1][citation:7]
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      # 4. 将生成的APK上传到GitHub，方便下载 [citation:1][citation:4][citation:9]
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

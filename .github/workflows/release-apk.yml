name: Build & Release from Zip (with debugging)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '发布名称'
        required: true
        default: 'Auto Build'
      zip_filename:
        description: '压缩包文件名'
        required: true
        default: 'AudioCaptureApp_Final_For_Friend.tar.gz'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 升级到 v4 避免 Node.js 警告

      - name: Unpack Source Code
        run: |
          echo "📦 正在解压 ${{ github.event.inputs.zip_filename }} ..."
          tar -xzf "${{ github.event.inputs.zip_filename }}"
          rm "${{ github.event.inputs.zip_filename }}"
          echo "✅ 解压完成，当前目录结构："
          ls -la
          echo "---- 递归查看所有文件 (前20行) ----"
          ls -R | head -20

      - name: Set up JDK 17
        uses: actions/setup-java@v4  # 升级到 v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ========== 超级调试 + 修复 gradlew ==========
      - name: Prepare gradlew (debug & fix)
        run: |
          set -x  # 显示执行的每条命令
          echo "🔍 当前工作目录: $(pwd)"
          echo "🔍 查找 gradlew 文件位置"
          find . -name "gradlew" -type f

          # 如果存在多个 gradlew，我们取第一个（或者您可以指定具体路径）
          GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ 错误: 没有找到 gradlew 文件！"
            exit 1
          fi
          echo "✅ 找到 gradlew: $GRADLEW_PATH"

          # 检查 Gradle Wrapper 相关文件
          WRAPPER_DIR=$(dirname "$GRADLEW_PATH")/gradle/wrapper
          if [ -d "$WRAPPER_DIR" ]; then
            echo "✅ Gradle wrapper 目录存在: $WRAPPER_DIR"
            ls -la "$WRAPPER_DIR"
          else
            echo "❌ 警告: Gradle wrapper 目录不存在！"
          fi

          # 切换到 gradlew 所在目录（方便后续操作）
          cd "$(dirname "$GRADLEW_PATH")"
          echo "🔍 切换到目录: $(pwd)"

          # 修复前检查文件类型和行尾
          echo "=== 修复前检查 ==="
          file gradlew
          echo "--- 前两行原始内容（含不可见字符）---"
          head -n 2 gradlew | cat -A
          echo "--- 文件权限 ---"
          ls -l gradlew

          echo "=== 开始修复 ==="
          # 安装 dos2unix（最可靠的方法）
          sudo apt-get update
          sudo apt-get install -y dos2unix
          dos2unix gradlew
          chmod +x gradlew

          echo "=== 修复后检查 ==="
          file gradlew
          echo "--- 前两行修复后内容 ---"
          head -n 2 gradlew | cat -A
          echo "--- 文件权限 ---"
          ls -l gradlew

          echo "=== 检查 Gradle wrapper JAR ==="
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "✅ gradle-wrapper.jar 存在"
          else
            echo "❌ gradle-wrapper.jar 不存在！请检查项目完整性。"
          fi

          # 记住当前 gradlew 所在目录，供后续步骤使用
          echo "GRADLEW_DIR=$(pwd)" >> $GITHUB_ENV

      # ========== 构建 APK ==========
      - name: Build APK
        run: |
          cd "$GRADLEW_DIR"
          echo "🔨 正在构建 APK，当前目录: $(pwd)"
          ./gradlew assembleDebug

      # ========== 上传 Release ==========
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2  # 升级到 v2（支持 Node.js 20+）
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            📦 **自动构建版本**
            - 源文件: ${{ github.event.inputs.zip_filename }}
            - 时间: ${{ github.event.head_commit.timestamp }}
          files: ${{ env.GRADLEW_DIR }}/app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

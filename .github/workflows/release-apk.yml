name: Build & Release from Zip (Final)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '发布名称'
        required: true
        default: 'Auto Build'
      zip_filename:
        description: '压缩包文件名'
        required: true
        default: 'AudioCaptureApp_Final_For_Friend.tar.gz'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unpack Source Code
        run: |
          echo "📦 正在解压 ${{ github.event.inputs.zip_filename }} ..."
          tar -xzf "${{ github.event.inputs.zip_filename }}"
          rm "${{ github.event.inputs.zip_filename }}"
          echo "✅ 解压完成，当前目录："
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Locate gradlew
        id: locate
        run: |
          GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ 未找到 gradlew 文件！"
            exit 1
          fi
          cd "$(dirname "$GRADLEW_PATH")"
          echo "GRADLEW_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Extract Gradle version
        id: version
        run: |
          cd "$GRADLEW_DIR"
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            DIST_URL=$(grep "^distributionUrl" gradle/wrapper/gradle-wrapper.properties | cut -d= -f2- | tr -d ' ')
            GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9.]+(?=-bin\.zip|-all\.zip)' || echo "8.5")
          else
            GRADLE_VERSION="8.5"
          fi
          echo "GRADLE_VERSION=$GRADLE_VERSION" >> $GITHUB_OUTPUT

      - name: Restore gradle-wrapper.jar if missing
        run: |
          cd "$GRADLEW_DIR"
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ $(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0) -lt 10240 ]; then
            JAR_URL="https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/${{ steps.version.outputs.GRADLE_VERSION }}/gradle-wrapper-${{ steps.version.outputs.GRADLE_VERSION }}.jar"
            curl -f -L -o gradle/wrapper/gradle-wrapper.jar "$JAR_URL" || echo "下载失败，将使用独立 Gradle"
          fi

      - name: Create init script
        run: |
          cd "$GRADLEW_DIR"
          cat > init.gradle << 'EOF'
          beforeSettings { settings ->
              settings.dependencyResolutionManagement.repositoriesMode = RepositoriesMode.PREFER_PROJECT
          }
          EOF

      - name: Build with gradlew (if available)
        run: |
          cd "$GRADLEW_DIR"
          chmod +x gradlew
          if [ -f gradle/wrapper/gradle-wrapper.jar ] && [ $(stat -c%s gradle/wrapper/gradle-wrapper.jar) -ge 10240 ]; then
            ./gradlew -I init.gradle assembleDebug
          else
            echo "gradlew 不可用，下载独立 Gradle ${{ steps.version.outputs.GRADLE_VERSION }}"
            wget -q "https://services.gradle.org/distributions/gradle-${{ steps.version.outputs.GRADLE_VERSION }}-bin.zip"
            unzip -q gradle-${{ steps.version.outputs.GRADLE_VERSION }}-bin.zip
            ./gradle-${{ steps.version.outputs.GRADLE_VERSION }}/bin/gradle -I init.gradle assembleDebug
          fi

      - name: Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          files: ${{ env.GRADLEW_DIR }}/app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release from Zip (Fix Gradle version)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '发布名称'
        required: true
        default: 'Auto Build'
      zip_filename:
        description: '压缩包文件名'
        required: true
        default: 'AudioCaptureApp_Final_For_Friend.tar.gz'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unpack Source Code
        run: |
          echo "📦 正在解压 ${{ github.event.inputs.zip_filename }} ..."
          tar -xzf "${{ github.event.inputs.zip_filename }}"
          rm "${{ github.event.inputs.zip_filename }}"
          echo "✅ 解压完成，当前目录结构："
          ls -la
          echo "---- 递归查看文件列表 (前20行) ----"
          ls -R | head -20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Locate and chmod gradlew
        id: locate
        run: |
          set -x
          GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ 未找到 gradlew 文件！"
            exit 1
          fi
          echo "✅ 找到 gradlew: $GRADLEW_PATH"
          cd "$(dirname "$GRADLEW_PATH")"
          echo "当前目录: $(pwd)"
          chmod +x gradlew
          ls -l gradlew
          echo "GRADLEW_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Extract Gradle version from wrapper properties
        id: version
        run: |
          cd "$GRADLEW_DIR"
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            DIST_URL=$(grep "^distributionUrl" gradle/wrapper/gradle-wrapper.properties | cut -d= -f2- | tr -d ' ')
            echo "distributionUrl: $DIST_URL"
            # 提取版本号 (支持 gradle-<version>-bin.zip 或 gradle-<version>-all.zip)
            GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9.]+(?=-bin\.zip|-all\.zip)' || true)
            if [ -z "$GRADLE_VERSION" ]; then
              echo "❌ 无法从 distributionUrl 提取版本号，使用默认版本 8.5"
              GRADLE_VERSION="8.5"
            fi
          else
            echo "❌ gradle-wrapper.properties 不存在，使用默认版本 8.5"
            GRADLE_VERSION="8.5"
          fi
          echo "GRADLE_VERSION=$GRADLE_VERSION" >> $GITHUB_OUTPUT
          echo "✅ 所需 Gradle 版本: $GRADLE_VERSION"

      - name: Fix gradle-wrapper.jar (if missing)
        run: |
          cd "$GRADLEW_DIR"
          mkdir -p gradle/wrapper
          # 如果 gradle-wrapper.jar 不存在或小于 10KB，视为无效并下载
          NEED_DOWNLOAD=false
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            NEED_DOWNLOAD=true
          else
            JAR_SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)
            if [ "$JAR_SIZE" -lt 10240 ]; then
              NEED_DOWNLOAD=true
            fi
          fi

          if [ "$NEED_DOWNLOAD" = true ]; then
            echo "⚠️ gradle-wrapper.jar 缺失或无效，尝试下载版本 ${{ steps.version.outputs.GRADLE_VERSION }}"
            # 从 Maven Central 下载对应版本的 gradle-wrapper.jar
            JAR_URL="https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/${{ steps.version.outputs.GRADLE_VERSION }}/gradle-wrapper-${{ steps.version.outputs.GRADLE_VERSION }}.jar"
            if curl -f -L -o gradle/wrapper/gradle-wrapper.jar "$JAR_URL"; then
              echo "✅ gradle-wrapper.jar 下载成功"
            else
              echo "❌ Maven Central 下载失败，尝试从 Gradle 官方下载..."
              # 备选：从 Gradle 发行版中提取（需要下载整个 zip，这里直接使用已知结构）
              # 更简单：使用 SDKMAN 安装对应版本 Gradle 并复制其 wrapper jar
              # 但为了简化，我们设置一个标志，后面直接使用 SDKMAN 安装 Gradle 构建
              echo "DOWNLOAD_FAILED=true" >> $GITHUB_ENV
            fi
          fi

      - name: Setup Gradle via SDKMAN (if wrapper fix failed)
        if: env.DOWNLOAD_FAILED == 'true'
        run: |
          # 安装 SDKMAN
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          # 安装所需版本的 Gradle
          sdk install gradle ${{ steps.version.outputs.GRADLE_VERSION }}
          # 将 gradle 加入 PATH（sdkman 会自动处理）
          echo "✅ Gradle ${{ steps.version.outputs.GRADLE_VERSION }} 安装完成"

      - name: Build with gradlew (if wrapper available)
        if: env.DOWNLOAD_FAILED != 'true'
        run: |
          cd "$GRADLEW_DIR"
          ./gradlew assembleDebug

      - name: Build with installed Gradle (fallback)
        if: env.DOWNLOAD_FAILED == 'true'
        run: |
          cd "$GRADLEW_DIR"
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          gradle assembleDebug

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            📦 **自动构建版本**
            - 源文件: ${{ github.event.inputs.zip_filename }}
            - Gradle 版本: ${{ steps.version.outputs.GRADLE_VERSION }}
          files: ${{ env.GRADLEW_DIR }}/app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

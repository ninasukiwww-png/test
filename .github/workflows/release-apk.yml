name: Build & Release from Zip (Auto-fix gradle-wrapper.jar)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: '版本号 (例如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: '发布名称'
        required: true
        default: 'Auto Build'
      zip_filename:
        description: '压缩包文件名'
        required: true
        default: 'AudioCaptureApp_Final_For_Friend.tar.gz'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unpack Source Code
        run: |
          echo "📦 正在解压 ${{ github.event.inputs.zip_filename }} ..."
          tar -xzf "${{ github.event.inputs.zip_filename }}"
          rm "${{ github.event.inputs.zip_filename }}"
          echo "✅ 解压完成，当前目录结构："
          ls -la
          echo "---- 递归查看文件列表 (前20行) ----"
          ls -R | head -20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 步骤1：定位 gradlew 并赋予执行权限
      - name: Locate and chmod gradlew
        run: |
          set -x
          GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "❌ 未找到 gradlew 文件！"
            exit 1
          fi
          echo "✅ 找到 gradlew: $GRADLEW_PATH"
          cd "$(dirname "$GRADLEW_PATH")"
          echo "当前目录: $(pwd)"
          chmod +x gradlew
          ls -l gradlew
          echo "GRADLEW_DIR=$(pwd)" >> $GITHUB_ENV

      # 步骤2：修复 gradle-wrapper.jar（如果缺失或为占位文件）
      - name: Fix gradle-wrapper.jar
        id: fix-wrapper
        run: |
          cd "$GRADLEW_DIR"
          echo "检查 gradle/wrapper 目录："
          ls -la gradle/wrapper/ || true

          # 判断是否需要下载（文件不存在或小于 10KB）
          NEED_DOWNLOAD=false
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "❌ gradle-wrapper.jar 不存在"
            NEED_DOWNLOAD=true
          else
            JAR_SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar 2>/dev/null || echo 0)
            if [ "$JAR_SIZE" -lt 10240 ]; then  # 10KB 以下认为是无效文件
              echo "⚠️ gradle-wrapper.jar 大小异常 ($JAR_SIZE 字节)，可能为占位文件"
              NEED_DOWNLOAD=true
            else
              echo "✅ gradle-wrapper.jar 存在且大小正常"
            fi
          fi

          if [ "$NEED_DOWNLOAD" = true ]; then
            echo "正在尝试下载正确的 gradle-wrapper.jar..."

            # 从 gradle-wrapper.properties 中提取 distributionUrl
            PROPERTIES_FILE="gradle/wrapper/gradle-wrapper.properties"
            if [ ! -f "$PROPERTIES_FILE" ]; then
              echo "❌ 未找到 gradle-wrapper.properties，无法确定 Gradle 版本"
              exit 1
            fi

            # 提取 distributionUrl 中的版本号 (例如 gradle-8.0.2-bin.zip)
            DIST_URL=$(grep "^distributionUrl" "$PROPERTIES_FILE" | cut -d= -f2- | tr -d ' ')
            echo "distributionUrl: $DIST_URL"

            # 尝试提取版本号 (格式：gradle-<version>-bin.zip 或 gradle-<version>-all.zip)
            GRADLE_VERSION=$(echo "$DIST_URL" | grep -oP 'gradle-\K[0-9.]+(?=-bin\.zip|-all\.zip)')
            if [ -z "$GRADLE_VERSION" ]; then
              echo "❌ 无法从 distributionUrl 提取版本号，使用默认版本 8.0.2"
              GRADLE_VERSION="8.0.2"
            fi
            echo "检测到 Gradle 版本: $GRADLE_VERSION"

            # 从 Maven Central 下载对应版本的 gradle-wrapper.jar
            JAR_URL="https://repo1.maven.org/maven2/org/gradle/gradle-wrapper/${GRADLE_VERSION}/gradle-wrapper-${GRADLE_VERSION}.jar"
            echo "下载地址: $JAR_URL"
            mkdir -p gradle/wrapper
            if curl -f -L -o gradle/wrapper/gradle-wrapper.jar "$JAR_URL"; then
              echo "✅ gradle-wrapper.jar 下载成功"
            else
              echo "⚠️ Maven Central 下载失败，尝试从 Gradle GitHub 下载..."
              # 备选：从 Gradle 源码仓库下载 (可能需要 raw 地址)
              GITHUB_URL="https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar"
              if curl -f -L -o gradle/wrapper/gradle-wrapper.jar "$GITHUB_URL"; then
                echo "✅ 从 GitHub 下载成功"
              else
                echo "❌ 所有下载方式均失败，将使用系统 Gradle 作为后备方案"
                echo "fallback=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

          # 最终检查
          ls -la gradle/wrapper/
          echo "fallback=${fallback:-false}" >> $GITHUB_OUTPUT

      # 步骤3：如果 wrapper 修复成功，使用 gradlew 构建
      - name: Build with gradlew
        if: steps.fix-wrapper.outputs.fallback != 'true'
        run: |
          cd "$GRADLEW_DIR"
          echo "🔨 使用 gradlew 构建 APK"
          ./gradlew assembleDebug

      # 步骤4：后备方案 - 使用系统 Gradle 构建
      - name: Build with system Gradle (fallback)
        if: steps.fix-wrapper.outputs.fallback == 'true'
        run: |
          cd "$GRADLEW_DIR"
          echo "🔨 使用系统 Gradle 构建 APK（后备方案）"
          sudo apt-get update
          sudo apt-get install -y gradle
          gradle assembleDebug

      # 步骤5：上传 APK（无论哪种方式构建，APK 路径通常一致）
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: ${{ github.event.inputs.release_name }}
          body: |
            📦 **自动构建版本**
            - 源文件: ${{ github.event.inputs.zip_filename }}
            - 构建方式: ${{ steps.fix-wrapper.outputs.fallback == 'true' && '系统 Gradle' || 'Gradle Wrapper' }}
          files: ${{ env.GRADLEW_DIR }}/app/build/outputs/apk/debug/*.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
